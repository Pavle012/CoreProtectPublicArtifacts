name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build
        run: mvn -B verify -Dproject.branch="development"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          # artifact name includes the run number so each run is unique
          name: coreprotect-artifacts-${{ github.run_number }}
          # upload the whole target directory and any jar files under nested modules
          path: |
            target
            **/target/*.jar
          # don't fail the job if no files are found; just warn
          if-no-files-found: warn
